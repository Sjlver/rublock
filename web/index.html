<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Generate and print Doplo logic puzzles in various sizes.">
  <title>Doplo Puzzle Generator</title>
  <style>
    /* ── Reset & base ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f4f0;
      color: #1a1a1a;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    :focus-visible {
      outline: 2px solid #4f46e5;
      outline-offset: 2px;
    }

    /* ── Screen-only controls ──────────────────────────────────────────── */
    #controls {
      background: #fff;
      border-bottom: 1px solid #ddd;
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    #controls h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-right: auto;
    }

    .field {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .field label,
    .field .label-text {
      font-size: 0.9rem;
      color: #555;
    }

    .field select,
    .field input[type="number"] {
      font-size: 0.9rem;
      padding: 0.4rem 0.6rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      width: 5rem;
      background: #fafafa;
    }

    .field input[type="number"].narrow {
      width: 3.5rem;
    }

    /* Primary button */
    .btn-primary {
      padding: 0.5rem 1.4rem;
      font-size: 0.95rem;
      font-weight: 600;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.15s;
    }
    .btn-primary:hover:not(:disabled) { background: #4338ca; }
    .btn-primary:disabled { background: #a5b4fc; cursor: not-allowed; }

    /* Ghost button */
    .btn-ghost {
      padding: 0.5rem 1.2rem;
      font-size: 0.9rem;
      font-weight: 500;
      background: transparent;
      color: #4f46e5;
      border: 1.5px solid #c7d2fe;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.15s, border-color 0.15s;
    }
    .btn-ghost:hover:not(:disabled) { background: #eef2ff; border-color: #a5b4fc; }
    .btn-ghost:disabled { opacity: 0.45; cursor: not-allowed; }

    #status {
      font-size: 0.85rem;
      color: #666;
      min-width: 6rem;
    }

    /* ── Preview area (single puzzle, screen only) ─────────────────────── */
    #preview {
      flex: 1;
      padding: 3rem 2rem;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
    }

    /* ── Print output (hidden on screen, shown when printing) ─────────── */
    #print-output {
      display: none;
    }

    /* Each .page-group holds 6 puzzles in a 2-column layout */
    .page-group {
      display: grid;
      grid-template-columns: repeat(2, auto);
      gap: 2rem 3rem;
      position: relative;
    }

    /* ── Individual puzzle ─────────────────────────────────────────────── */
    .puzzle-wrap {
      display: inline-block;
    }

    .puzzle {
      border-collapse: collapse;
    }

    .puzzle td,
    .puzzle th {
      width: 2.5rem;
      height: 2.5rem;
      text-align: center;
      vertical-align: middle;
      font-size: 1.05rem;
    }

    /* Target cells (first row and first column) */
    .puzzle .target {
      font-weight: 700;
      font-size: 1rem;
      color: #333;
    }

    /* Playable cells */
    .puzzle .cell {
      border: 1.5px solid #444;
    }

    .puzzle .cell.selected {
      outline: 2.5px solid #4f46e5;
      outline-offset: -2.5px;
      background: #eef2ff;
    }

    .puzzle .cell.black {
      background: #1a1a1a;
    }

    #input-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem;
      padding-top: 1rem;
      max-width: min(100vw - 2rem, 34rem);
    }

    .btn-input {
      min-width: 2.8rem;
      min-height: 2.8rem;
      padding: 0.5rem 0.9rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 10px;
      border: 1.5px solid #d1d5db;
      background: #fff;
      color: #1f2937;
      cursor: pointer;
      transition: background-color 0.15s, border-color 0.15s;
    }

    .btn-input:hover:enabled {
      background: #f9fafb;
      border-color: #9ca3af;
    }

    .btn-input:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    /* ── Site footer ──────────────────────────────────────────────────── */
    #footer {
      background: #fff;
      border-top: 1px solid #ddd;
      padding: 0.75rem 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      font-size: 0.85rem;
      color: #555;
    }

    #footer a {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      color: #4f46e5;
      text-decoration: none;
    }

    #footer a:hover {
      text-decoration: underline;
    }

    #footer svg {
      flex-shrink: 0;
    }

    /* ── Promo footer ──────────────────────────────────────────────────── */
    .promo {
      display: none;
      font-size: 0.75rem;
      color: #666;
      text-align: center;
      padding-top: 0.5rem;
      border-top: 1px solid #ccc;
      margin-top: 0.5rem;
    }

    /* ── Print styles ──────────────────────────────────────────────────── */
    @media print {
      body { background: #fff; }

      #controls  { display: none; }
      #footer    { display: none; }
      #preview   { display: none; }
      #input-bar { display: none; }

      #print-output {
        display: block;
        padding: 0;
      }

      .page-group {
        gap: 8mm 10mm;
        break-after: page;
        page-break-after: always; /* fallback for older engines */
        padding-bottom: 12mm;
      }

      .page-group:last-child {
        break-after: auto;
        page-break-after: auto;
      }

      .promo {
        display: block;
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
      }

      .puzzle td,
      .puzzle th {
        width: 9mm;
        height: 9mm;
        font-size: 8pt;
      }

      .puzzle .target {
        font-size: 8pt;
      }

      .puzzle .cell {
        border: 0.8pt solid #333;
      }
    }
  </style>
</head>
<body>

<header id="controls">
  <h1>Doplo Puzzle Generator</h1>

  <div class="field">
    <label for="sel-size">Size</label>
    <select id="sel-size">
      <option value="5">5 × 5</option>
      <option value="6" selected>6 × 6</option>
      <option value="7">7 × 7</option>
      <option value="8">8 × 8</option>
    </select>
  </div>

  <button id="btn-another" class="btn-ghost" disabled>Generate another</button>

  <div class="field">
    <label for="inp-pages" class="label-text">Generate</label>
    <input id="inp-pages" class="narrow" type="number" min="1" max="20" value="4">
    <span class="label-text">pages and</span>
    <button id="btn-print" class="btn-primary" disabled>Print</button>
  </div>

  <span id="status" role="status" aria-live="polite">Loading…</span>
</header>

<main id="preview"></main>
<footer id="footer">
  Source code:

  </a>
</footer>
<div id="print-output" aria-hidden="true"></div>

<script type="module">
  import init, { generate_puzzle } from './pkg/rublock.js';

  const btnAnother    = document.getElementById('btn-another');
  const btnPrint      = document.getElementById('btn-print');
  const selSize       = document.getElementById('sel-size');
  const inpPages      = document.getElementById('inp-pages');
  const statusEl      = document.getElementById('status');
  const previewEl     = document.getElementById('preview');
  const printOutputEl = document.getElementById('print-output');

  let puzzleData   = null;
  let cellValues   = [];
  let selectedCell = null;

  // ── Shared table builder ──────────────────────────────────────────────
  // onCell(td, row, col) is called for each playable cell, if provided.
  function buildPuzzleTable({ size, row_targets, col_targets }, onCell = null) {
    const table = document.createElement('table');
    table.className = 'puzzle';

    const thead = table.createTHead();
    const hrow  = thead.insertRow();
    const corner = document.createElement('th');
    corner.className = 'corner';
    hrow.appendChild(corner);
    for (let c = 0; c < size; c++) {
      const th = document.createElement('th');
      th.scope = 'col';
      th.className = 'target';
      th.textContent = col_targets[c];
      hrow.appendChild(th);
    }

    const tbody = table.createTBody();
    for (let r = 0; r < size; r++) {
      const row = tbody.insertRow();
      const th  = document.createElement('th');
      th.scope      = 'row';
      th.className  = 'target';
      th.textContent = row_targets[r];
      row.appendChild(th);
      for (let c = 0; c < size; c++) {
        const td = row.insertCell();
        td.className = 'cell';
        onCell?.(td, r, c);
      }
    }

    return table;
  }

  // ── Static puzzle (used for print output) ────────────────────────────
  function renderPuzzle(json) {
    const data  = JSON.parse(json);
    const table = buildPuzzleTable(data);
    const wrap  = document.createElement('div');
    wrap.className = 'puzzle-wrap';
    wrap.appendChild(table);
    return wrap;
  }

  // ── Interactive preview ───────────────────────────────────────────────
  function renderPreview() {
    if (!puzzleData) return;
    previewEl.innerHTML = '';

    const table = buildPuzzleTable(puzzleData, (cell, r, c) => {
      cell.dataset.row = r;
      cell.dataset.col = c;

      const value = cellValues[r][c];
      if (value === 'black') {
        cell.classList.add('black');
      } else if (value !== null) {
        cell.textContent = String(value);
      }

      if (selectedCell?.row === r && selectedCell?.col === c) {
        cell.classList.add('selected');
      }

      cell.addEventListener('click', () => {
        selectedCell = { row: r, col: c };
        renderPreview();
      });
    });

    const wrap = document.createElement('div');
    wrap.className = 'puzzle-wrap';
    wrap.appendChild(table);
    previewEl.appendChild(wrap);

    const inputBar      = document.createElement('div');
    inputBar.id         = 'input-bar';
    const buttonsDisabled = selectedCell === null;

    function makeInputButton(label, value) {
      const button       = document.createElement('button');
      button.type        = 'button';
      button.className   = 'btn-input';
      button.textContent = label;
      button.disabled    = buttonsDisabled;
      button.addEventListener('click', () => {
        if (!selectedCell) return;
        cellValues[selectedCell.row][selectedCell.col] = value;
        renderPreview();
      });
      return button;
    }

    inputBar.appendChild(makeInputButton('BLACK', 'black'));
    for (let n = 1; n <= puzzleData.size - 2; n++) {
      inputBar.appendChild(makeInputButton(String(n), n));
    }
    inputBar.appendChild(makeInputButton('CLEAR', null));
    previewEl.appendChild(inputBar);
  }

  function generatePreview() {
    const size = parseInt(selSize.value, 10);
    puzzleData = JSON.parse(generate_puzzle(size));
    cellValues = Array.from({ length: size }, () => Array(size).fill(null));
    selectedCell = null;
    renderPreview();
  }

  previewEl.addEventListener('click', (event) => {
    if (!selectedCell) return;
    if (!event.target.closest('.puzzle')) {
      selectedCell = null;
      renderPreview();
    }
  });

  // ── Print output ─────────────────────────────────────────────────────
  const PUZZLES_PER_PAGE = 6;
  const PROMO = `Doplo puzzles generated by ${window.location.origin}${window.location.pathname}`;

  async function fillPrintOutput(size, pages) {
    const total = pages * PUZZLES_PER_PAGE;
    printOutputEl.innerHTML = '';

    let generated = 0;
    while (generated < total) {
      const pageSize = Math.min(PUZZLES_PER_PAGE, total - generated);
      const group    = document.createElement('div');
      group.className = 'page-group';

      for (let i = 0; i < pageSize; i++) {
        group.appendChild(renderPuzzle(generate_puzzle(size)));
      }

      const promo       = document.createElement('div');
      promo.className   = 'promo';
      promo.textContent = PROMO;
      group.appendChild(promo);

      printOutputEl.appendChild(group);
      generated += pageSize;

      // Yield to the browser between pages so the UI doesn't freeze
      if (generated < total) await new Promise(r => setTimeout(r, 0));
    }
  }

  async function generateAndPrint() {
    const size  = parseInt(selSize.value, 10);
    const pages = Math.max(1, Math.min(20, parseInt(inpPages.value, 10) || 4));

    btnPrint.disabled    = true;
    btnAnother.disabled  = true;
    statusEl.textContent = 'Generating…';

    await fillPrintOutput(size, pages);

    statusEl.textContent = 'Ready';
    btnPrint.disabled    = false;
    btnAnother.disabled  = false;

    window.print();
  }

  // ── Initialise wasm ──────────────────────────────────────────────────
  try {
    await init();
  } catch (err) {
    statusEl.textContent = 'Failed to load';
    console.error('WASM init failed:', err);
    throw err;
  }

  btnAnother.disabled  = false;
  btnPrint.disabled    = false;
  statusEl.textContent = 'Ready';

  generatePreview();
  fillPrintOutput(parseInt(selSize.value, 10), 1);

  selSize.addEventListener('change', () => {
    generatePreview();
    fillPrintOutput(parseInt(selSize.value, 10), 1);
  });
  btnAnother.addEventListener('click', generatePreview);
  btnPrint.addEventListener('click', generateAndPrint);
</script>

</body>
</html>
